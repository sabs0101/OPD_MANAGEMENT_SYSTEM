<!DOCTYPE html>
<html>
<head>
<title>Edit Appointment</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="sidebar">
<h4 class="text-center text-white"><i class="fas fa-hospital"></i> OPD System</h4>

<a href="/"><i class="fas fa-chart-pie"></i> Dashboard</a>
<a href="/patients/new"><i class="fas fa-user-plus"></i> Add Patient</a>
<a href="/doctors"><i class="fas fa-user-md"></i> Doctors</a>
<a href="/nurses"><i class="fas fa-user-nurse"></i> Nurses</a>
<a href="/appointments" class="active"><i class="fas fa-calendar-check"></i> Appointments</a>
<a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">

<div class="card-box">
<h3 class="mb-4">Edit Appointment #{{ appointment.appointment_id }}</h3>

<form action="/appointments/edit/{{ appointment.appointment_id }}" method="POST">
<div class="row mb-3">
<div class="col-md-6">
<label class="form-label">Patient *</label>
<select name="patient_id" class="form-control" required>
<option value="">Select Patient</option>
{% for p in patients %}
<option value="{{ p.patient_id }}" {% if p.patient_id == appointment.patient_id %}selected{% endif %}>
  {{ p.patient_id }} - {{ p.name }}
</option>
{% endfor %}
</select>
</div>

<div class="col-md-6">
<label class="form-label">Doctor *</label>
<select name="doctor_id" class="form-control" required>
<option value="">Select Doctor</option>
{% for d in doctors %}
<option value="{{ d.doctor_id }}" {% if d.doctor_id == appointment.doctor_id %}selected{% endif %}>
  {{ d.name }}
</option>
{% endfor %}
</select>
</div>
</div>

<div class="row mb-3">
<div class="col-md-6">
<label class="form-label">Date *</label>
<input type="date" name="appointment_date" class="form-control" required
       value="{{ appointment.appointment_date }}">
</div>

<div class="col-md-6">
<label class="form-label">Time *</label>
<input type="time" name="appointment_time" class="form-control" required
       value="{{ appointment.appointment_time }}">
</div>
</div>

<div class="d-flex gap-2 mt-3">
<button type="submit" class="btn btn-warning w-50">
  <i class="fas fa-save"></i> Save Changes
</button>
<a href="/appointments" class="btn btn-secondary w-50">
  <i class="fas fa-times"></i> Cancel
</a>
</div>

</form>

</div>

</div>

</body>
</html>
