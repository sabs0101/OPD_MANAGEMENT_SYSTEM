<!DOCTYPE html>
<html>
<head>

<title>Add Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="sidebar">
<h4 class="text-center text-white"><i class="fas fa-hospital"></i> OPD System</h4>

<a href="/"><i class="fas fa-chart-pie"></i> Dashboard</a>
<a href="/patients/new" class="active"><i class="fas fa-user-plus"></i> Add Patient</a>
<a href="/doctors"><i class="fas fa-user-md"></i> Doctors</a>
<a href="/nurses"><i class="fas fa-user-nurse"></i> Nurses</a>
<a href="/appointments"><i class="fas fa-calendar-check"></i> Appointments</a>
<a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">

<div class="card-box" style="max-width:600px;margin:auto">

<h3>Add Patient</h3>

<form method="POST">

<input name="name"
class="form-control mb-2"
placeholder="Name"
pattern="[A-Za-z ]+"
required>

<input type="number"
name="age"
class="form-control mb-2"
min="1"
max="120"
placeholder="Age"
required>

<select name="gender" class="form-control mb-2" required>
<option value="" disabled selected hidden>Gender</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<input name="phone"
class="form-control mb-2"
pattern="[0-9]{10}"
placeholder="Phone"
required>

<input name="disease"
class="form-control mb-2"
placeholder="Disease Category"
required>

<select name="doctor" class="form-control mb-2" required>
<option value="" disabled selected hidden>Doctor</option>

{% for d in doctors %}
<option value="{{d.name}}">{{d.name}}</option>
{% endfor %}

</select>

<select name="nurse" class="form-control mb-2" required>
<option value="" disabled selected hidden>Nurse</option>

{% for n in nurses %}
<option value="{{n.name}}">{{n.name}}</option>
{% endfor %}

</select>

<input name="family"
class="form-control mb-3"
placeholder="Family">

<button class="btn btn-success w-100">
Register Patient
</button>

</form>

</div>

</div>

</body>
</html>
