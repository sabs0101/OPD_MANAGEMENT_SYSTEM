<!DOCTYPE html>
<html>
<head>
<title>Register Appointment</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="sidebar">
<h4 class="text-center text-white"><i class="fas fa-hospital"></i> OPD System</h4>

<a href="/"><i class="fas fa-chart-pie"></i> Dashboard</a>
<a href="/patients/new"><i class="fas fa-user-plus"></i> Add Patient</a>
<a href="/doctors"><i class="fas fa-user-md"></i> Doctors</a>
<a href="/nurses"><i class="fas fa-user-nurse"></i> Nurses</a>
<a href="/appointments" class="active"><i class="fas fa-calendar-check"></i> Appointments</a>
<a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">

<div class="card-box">
<h3 class="mb-4">Register New Appointment</h3>

<form action="/appointments/new" method="POST">
<div class="row mb-3">
<div class="col-md-6">
<label class="form-label">Patient *</label>
<select name="patient_id" class="form-control" required>
<option value="">Select Patient</option>
{% for p in patients %}
<option value="{{ p.patient_id }}">{{ p.patient_id }} - {{ p.name }}</option>
{% endfor %}
</select>
</div>

<div class="col-md-6">
<label class="form-label">Doctor *</label>
<select name="doctor_id" class="form-control" required>
<option value="">Select Doctor</option>
{% for d in doctors %}
<option value="{{ d.doctor_id }}">{{ d.name }}</option>
{% endfor %}
</select>
</div>
</div>

<div class="row mb-3">
<div class="col-md-6">
<label class="form-label">Date *</label>
<input type="date" name="appointment_date" id="appointment_date" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">Time *</label>
<input type="time" name="appointment_time" class="form-control" required>
</div>
</div>

<button type="submit" class="btn btn-primary w-100 mt-3">Register Appointment</button>

</form>

</div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var today = new Date().toISOString().split('T')[0];
        document.getElementById("appointment_date").setAttribute('min', today);
    });
</script>

</body>
</html>
