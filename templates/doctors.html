<!DOCTYPE html>
<html>
<head>

<title>Doctors</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="sidebar">
<h4 class="text-center text-white"><i class="fas fa-hospital"></i> OPD System</h4>

<a href="/"><i class="fas fa-chart-pie"></i> Dashboard</a>
<a href="/patients/new"><i class="fas fa-user-plus"></i> Add Patient</a>
<a href="/doctors" class="active"><i class="fas fa-user-md"></i> Doctors</a>
<a href="/nurses"><i class="fas fa-user-nurse"></i> Nurses</a>
<a href="/appointments"><i class="fas fa-calendar-check"></i> Appointments</a>
<a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">

<div class="card-box">

<h3>Doctor Management</h3>

<form method="POST" class="mb-3">

<input name="name"
class="form-control mb-2"
placeholder="Doctor Name"
pattern="[A-Za-z ]+"
required>

<button class="btn btn-primary">
<i class="fas fa-plus"></i> Add Doctor
</button>

</form>

<table class="table table-hover table-borderless align-middle mt-4">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

{% for d in doctors %}

<tr>
<td>{{d.doctor_id}}</td>
<td>{{d.name}}</td>
<td>
    <a href="/doctors/delete/{{d.doctor_id}}" class="btn btn-sm btn-danger border-0 shadow-sm" onclick="return confirm('Are you sure you want to delete this doctor?');">
        <i class="fas fa-trash"></i> Delete
    </a>
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
